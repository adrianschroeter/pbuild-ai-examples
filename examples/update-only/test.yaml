name: "Update to Latest Upstream"
description: "Automatically update package to latest upstream version and update spec file to new standards"
order: 3

source:
  type: remote
  path: "../../sources/gawk.update-only"
  url: "https://src.opensuse.org/pool/gawk"
  ref: "c30cc95a4861c123bd2f75f4ec913ffe64592ea11f7bf1a3d39c9b21c12403d5" # our oldest version

command: "pbuild-ai"
options:
  - "--update-only"

expected:
  success: true
  changes: true
  files_modified:
    - "sysstat.spec"  # Version updates
    - "sysstat.changes"  # Changelog
  build_result: "not_built"


tags:
  - "basic"
  - "update"
