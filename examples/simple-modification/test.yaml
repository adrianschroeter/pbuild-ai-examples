name: "Simple Modification"
description: "Demonstrates using --modify flag to make targeted changes with a custom prompt"
order: 2

source:
  # Using cowsay as a simple example package
  type: remote
  path: "../../sources/glances.add_service"
  url: "https://src.opensuse.org/pool/python-Glances"
  ref: "45791911e811b009feff71974b1851581bdbf90b63b54ebe1c133ea99b3cc5a3"

command: "pbuild-ai"
options:
  - "--modify"
  - "Add a systemd service file for glances server and package it in the glances-common package."

expected:
  success: true
  changes: true  # --modify will create/modify files
  files_modified:
    - "python-Glances.spec"
    - "*.service"
  build_result: ""


tags:
  - "basic"
  - "modify"
  - "simple"
