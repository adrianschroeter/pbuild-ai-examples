name: "Generate New Package"
description: "Generate a complete package from scratch without any source files. So the AI is search itself where the source lifes and is hopefully right."
category: "generation"
order: 3

# No source needed for --generate mode, but specify where to create the generated files
source:
  type: none
  path: "../../sources/ripgrep"

options:
  - "--generate"
  - "package ripgrep CLI tool"

expected:
  should_succeed: true
  files_modified:
    - "ripgrep.spec"
    - "ripgrep.changes"

notes: |
  This example demonstrates pbuild-ai's ability to generate a complete package
  from scratch based on a natural language description. It doesn't require any
  existing source files - just a description of what package to create.

tags:
  - "generate"
  - "basic"
