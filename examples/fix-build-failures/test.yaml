name: "Fix Build Failures"
description: "Automatically detect and fix build failures. The AI analyzes build logs and applies appropriate patches. It may also decide to debug inside the build environment, where it is allowed to execute any command for harder cases."

order: 2

source:
  type: local
  path: "../../sources/fix-build-example"
  local_path: "./package"  # Relative to this example directory

command: "pbuild-ai"
options:
  - "--fix"

expected:
  success: true
  changes: true  # May apply fixes if build fails
  files_modified:
    - "*.spec"
    - "*.patch"
  build_result: "succeeded"

tags:
  - "intermediate"
  - "fix"
  - "build"
