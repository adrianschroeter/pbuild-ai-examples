name: "Backport Security Fix"
description: "Point the AI to some external commit and tell it to backport it. Doing a test build to verify it. We need  more memory for the build VM, so we manually specify it."
order: 5

source:
  # Type: "remote" = clone at runtime, "inline" = included in example dir, "manual" = user provides
  type: remote
  path: "../../sources/libarchive"
  url: "https://src.opensuse.org/pool/libarchive"
  ref: "da539241ef7df83d772531fe3f9fe57038ef850d61aaa059d27dfe3021509f88"  # Pin to specific commit for reproducibility

command: "pbuild-ai"
options:
  - "--modify"
  - "Get the security fix from https://github.com/libarchive/libarchive/commit/020c40df9e31ec727201a8e3ddf1f94093f8fc02 and apply it to the package. Make sure it applies cleanly to the code."
  - "--fix"
  - "--vm-memory"
  - "8096"

expected:
  success: true
  changes: true  # We expect source modifications from the security fix
  files_modified:
    - "libarchive.spec"
    - "*.patch"
  build_result: "succeeded"  # succeeded, failed, skipped

tags:
  - "security"
  - "fix"
  - "backport"
  - "advanced"
